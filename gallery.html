<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | SIR AMEER HAMZA</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Lightbox Overlay */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 10px;
            object-fit: contain;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            animation: zoomIn 0.25s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.85); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 28px;
            color: white;
            font-size: 36px;
            cursor: pointer;
            line-height: 1;
            transition: 0.2s;
        }

        .lightbox-close:hover {
            color: #4f7cff;
            transform: scale(1.15);
        }

        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 32px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        .lightbox-prev:hover,
        .lightbox-next:hover {
            background: #4f7cff;
        }

        /* Gallery images clickable */
        .gallery-grid img {
            cursor: pointer;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .gallery-card {
            margin-bottom: 35px;
        }

        .gallery-card h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #4f7cff;
            padding: 0 20px;
        }
    </style>

</head>

<body>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="OurStudents.html">OurStudents</a>
        <a href="courses.html">Courses</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section class="container">

        <h2 class="section-title">Gallery</h2>

        <!-- Conference -->
        <div class="gallery-card">
            <h3><i class="fa-solid fa-microphone-lines"></i> Conference Events</h3>
            <div class="gallery-grid" data-group="conference">
                <img src="images/conference.jpg"  alt="Conference">
                <img src="images/sirpic1.jpeg"    alt="Event 1">
                <img src="images/sirpic2.jpeg"    alt="Event 2">
                <img src="images/sirpic3.jpeg"    alt="Event 3">
                <img src="images/sirpic4.jpeg"    alt="Event 4">
                <img src="images/sirpic5.jpeg"    alt="Event 5">
            </div>
        </div>

        <!-- Workshop -->
        <div class="gallery-card">
            <h3><i class="fa-solid fa-chalkboard-user"></i> Workshop</h3>
            <div class="gallery-grid" data-group="workshop">
                <img src="images/workshop1.jpg" alt="Workshop 1">
                <img src="images/workshop2.jpg" alt="Workshop 2">
                <img src="images/workshop3.jpg" alt="Workshop 3">
                <img src="images/workshop4.jpg" alt="Workshop 4">
                <img src="images/workshop5.jpg" alt="Workshop 5">
                <img src="images/workshop6.jpg" alt="Workshop 6">
            </div>
        </div>

        <!-- Class Pictures -->
        <div class="gallery-card">
            <h3><i class="fa-solid fa-users"></i> Class Pictures</h3>
            <div class="gallery-grid" data-group="classpic">
                <img src="images/Uvi Group Pic.jpeg" alt="Class 1">
                <img src="images/GROUP.jpeg" alt="Class 2">
                <img src="images/Uvi Group Pic.jpeg" alt="Class 3">
                <img src="images/GROUP.jpeg" alt="Class 4">
                <img src="images/Uvi Group Pic.jpeg" alt="Class 5">
                <img src="images/GROUP.jpeg" alt="Class 6">
            </div>
        </div>

    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <button class="lightbox-prev" id="lightbox-prev">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <img src="" alt="" id="lightbox-img">
        <button class="lightbox-next" id="lightbox-next">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <footer>
        © 2026 SIR AMEER HAMZA. All rights reserved.
    </footer>

    <script>
        // Collect all images per group
        const lightbox     = document.getElementById('lightbox');
        const lightboxImg  = document.getElementById('lightbox-img');
        const closeBtn     = document.getElementById('lightbox-close');
        const prevBtn      = document.getElementById('lightbox-prev');
        const nextBtn      = document.getElementById('lightbox-next');

        let currentGroup = [];
        let currentIndex = 0;

        // Attach click to every gallery image
        document.querySelectorAll('.gallery-grid img').forEach(img => {
            img.addEventListener('click', () => {
                // Get all images in the same group
                const grid = img.closest('.gallery-grid');
                currentGroup = Array.from(grid.querySelectorAll('img'));
                currentIndex = currentGroup.indexOf(img);
                openLightbox();
            });
        });

        function openLightbox() {
            lightboxImg.src = currentGroup[currentIndex].src;
            lightboxImg.alt = currentGroup[currentIndex].alt;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function showPrev() {
            currentIndex = (currentIndex - 1 + currentGroup.length) % currentGroup.length;
            lightboxImg.src = currentGroup[currentIndex].src;
            lightboxImg.alt = currentGroup[currentIndex].alt;
        }

        function showNext() {
            currentIndex = (currentIndex + 1) % currentGroup.length;
            lightboxImg.src = currentGroup[currentIndex].src;
            lightboxImg.alt = currentGroup[currentIndex].alt;
        }

        closeBtn.addEventListener('click', closeLightbox);
        prevBtn.addEventListener('click', showPrev);
        nextBtn.addEventListener('click', showNext);

        // Click outside image to close
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) closeLightbox();
        });

        // Keyboard navigation
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowLeft')  showPrev();
            if (e.key === 'ArrowRight') showNext();
            if (e.key === 'Escape')     closeLightbox();
        });
    </script>

</body>
</html>
